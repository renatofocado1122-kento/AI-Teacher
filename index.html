<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Planos de Aula — AI English Teacher</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h1>AI English Teacher</h1>

<button onclick="generate()">Gerar plano de aula</button>

<hr>

<h2>AI English Teacher Chat</h2>

<input id="userInput" type="text" placeholder="Type your sentence in English..." />

<button onclick="sendMessage()">Send</button>

<div id="response" style="margin-top:20px;"></div>

<hr>

<div id="result-area" style="display:none">
<h2>Plano de Aula</h2>
<div id="result-box"></div>
<button onclick="copyResult()">Copiar texto</button>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://SEU_PROJECT_URL.supabase.co",
"SUA_ANON_PUBLIC_KEY"
);

let selectedLevel = "B1";
let selectedLang = "pt";

async function generate(){

const prompt = "Create a complete English lesson plan for B1 level students.";

const resultArea = document.getElementById("result-area");
const resultBox = document.getElementById("result-box");

resultArea.style.display = "block";

resultBox.innerHTML = "Gerando plano...";

try{

const res = await fetch("/api/ai?message=" + encodeURIComponent(prompt));

const data = await res.json();

const text = data.choices?.[0]?.message?.content || "No response";

resultBox.innerText = text;

}catch(error){

resultBox.innerText = "Erro ao conectar com a IA.";

}

}

async function sendMessage(){

const input = document.getElementById("userInput");

const message = input.value;

input.value = "";

if(!message) return;

const responseBox = document.getElementById("response");

responseBox.innerHTML = "Thinking...";

try{

const res = await fetch("/api/ai?message=" + encodeURIComponent(message));

const data = await res.json();

const reply = data.choices?.[0]?.message?.content || "No response";

responseBox.innerHTML = "<b>AI:</b> " + reply;

}catch(error){

responseBox.innerHTML = "Error connecting to AI";

}

}

function copyResult(){

const text = document.getElementById("result-box").textContent;

navigator.clipboard.writeText(text).then(()=>{

alert("Texto copiado!");

});

}

</script>

</body>
</html>
